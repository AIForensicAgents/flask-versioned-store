app = "flask-versioned-store"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[mounts]
  source = "store_data"
  destination = "/data"
  initial_size = 1

[env]
  FLASK_ENV = "production"
  STORAGE_BASE_DIR = "/data/store"
  PORT = "8080"